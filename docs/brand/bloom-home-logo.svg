<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Bloom Home">
  <g transform="translate(6, 12)">
    <!-- simple four-petal bloom mark -->
    <g fill="#C1694F">
      <ellipse cx="28" cy="14" rx="9" ry="14" transform="rotate(0 28 28)"/>
      <ellipse cx="28" cy="14" rx="9" ry="14" transform="rotate(90 28 28)"/>
    </g>
    <g fill="#8A9A82">
      <ellipse cx="28" cy="14" rx="9" ry="14" transform="rotate(45 28 28)"/>
      <ellipse cx="28" cy="14" rx="9" ry="14" transform="rotate(135 28 28)"/>
    </g>
    <circle cx="28" cy="28" r="6" fill="#2B2622"/>
  </g>
  <text
    x="76"
    y="42"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    letter-spacing="0.5"
    fill="#2B2622"
  >Bloom Home</text>
